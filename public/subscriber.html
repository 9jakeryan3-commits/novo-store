<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="3; url=https://app.novo-aitrading.app">
<title>NoVo — Member Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b1527; color: #8aacc8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .wrap { max-width: 460px; width: 100%; }
  .logo { height: 42px; width: auto; display: block; margin: 0 auto 8px; }
  .tag { font-size: 11px; color: #506e8f; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 32px; }
  .card { background: #0e1c35; border: 1px solid #1b2e4e; border-radius: 12px; padding: 32px; text-align: center; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #3b82f6; }
  h2 { font-size: 20px; font-weight: 800; color: #eaf3ff; margin-bottom: 10px; letter-spacing: -0.3px; }
  p { font-size: 14px; color: #8aacc8; line-height: 1.6; margin-bottom: 20px; }
  .btn { display: block; background: #3b82f6; color: #fff; text-decoration: none; padding: 14px; border-radius: 6px; font-weight: 700; font-size: 15px; }
  .btn:hover { opacity: 0.85; }
  .footer { text-align: center; font-size: 12px; color: #506e8f; margin-top: 16px; }
  .footer a { color: #3b82f6; }
</style>
</head>
<body>
<div class="wrap">
  <img src="/novo-logo.png" alt="NoVo" class="logo">
  <div class="tag">Member Portal</div>
  <div class="card">
    <h2>Your portal has moved</h2>
    <p>Manage your subscription and open your NoVo dashboard from your member portal. Redirecting you now&hellip;</p>
    <a class="btn" href="https://app.novo-aitrading.app">Go to your portal &rarr;</a>
  </div>
  <div class="footer">
    <p style="margin-top:16px;">Questions? Email <a href="mailto:support@novo-aitrading.app">support@novo-aitrading.app</a></p>
    <p style="margin-top:6px;"><a href="/">Back to novo-aitrading.app</a></p>
  </div>
</div>
</body>
</html>
